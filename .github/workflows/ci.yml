name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  web-lint:
    name: Lint MiniOS web runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check all JS
        run: |
          fail=0
          for f in $(find MiniOS/web/js -name '*.js'); do
            node --check "$f" || { echo "SYNTAX FAIL: $f"; fail=1; }
          done
          exit $fail
      - name: Validate JSON assets
        run: |
          for f in $(find MiniOS/Assets.xcassets -name '*.json') .claude/launch.json; do
            [ -f "$f" ] && node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || true
          done
      - name: Check index.html references exist
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const html=fs.readFileSync('MiniOS/web/index.html','utf8');
          const refs=[...html.matchAll(/src="([^"]+\.js)"/g)].map(m=>m[1]);
          let bad=0;
          for(const r of refs){ if(!fs.existsSync('MiniOS/web/'+r)){console.error('MISSING',r);bad=1;} }
          process.exit(bad);
          NODE

  ios-build:
    name: Build iOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode
        run: xcodebuild -version
      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project MiniOS.xcodeproj \
            -scheme MiniOS \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
